<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TUBETALKIE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">

    <header>
      <div class="logo">&#9654; TUBETALKIE</div>
      <p class="tagline">Ask anything about any YouTube video</p>
    </header>

    <main>

      <!-- Load Section -->
      <div id="load-section" class="card">
        <label for="url-input">Paste a YouTube URL</label>
        <div class="url-row">
          <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=..." />
          <button id="load-btn">Load Video</button>
        </div>
        <p id="load-status" class="status"></p>
      </div>

      <!-- Chat Section -->
      <div id="chat-section" class="card hidden">
        <div id="video-info">
          <span id="video-title" class="video-title"></span>
          <button id="clear-btn">&#x1F5D1; Clear</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-row">
          <input type="text" id="question-input" placeholder="Ask a question about this video..." />
          <button id="send-btn">Send</button>
        </div>
      </div>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
